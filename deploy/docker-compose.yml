# Dauction local infra — `make up` / `make down` from the repo root.
#
# Brings up: one isolated Postgres PER data-owning service + NATS (JetStream)
# + Jaeger (OTLP). Service containers themselves are added per build phase
# (see the commented template at the bottom); each points its koanf config at
# its OWN database, the shared NATS, and the Jaeger collector.
#
# DB isolation is physical here (separate Postgres instances) to enforce the
# golden rule: no service reaches into another's database (CLAUDE.md §0, §7).

name: dauction

# ---- reusable Postgres template -------------------------------------------
x-postgres: &postgres
  image: postgres:16-alpine
  restart: unless-stopped
  environment: &postgres-env
    POSTGRES_USER: dauction
    POSTGRES_PASSWORD: dauction
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U dauction"]
    interval: 5s
    timeout: 3s
    retries: 10

services:
  # ===== shared event bus =====
  nats:
    image: nats:2.10-alpine
    container_name: dauction-nats
    restart: unless-stopped
    command: ["-c", "/etc/nats/nats.conf", "-js"]
    volumes:
      - ./nats/nats.conf:/etc/nats/nats.conf:ro
      - nats-data:/data/jetstream
    ports:
      - "14222:4222"  # client (host)
      - "18222:8222"  # monitoring (host)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ===== tracing (OTLP) =====
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: dauction-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317"   # OTLP gRPC  (services -> here)
      - "4318:4318"   # OTLP HTTP

  # ===== one Postgres per data-owning service (CLAUDE.md §2/§7) =====
  pg-identity:
    <<: *postgres
    container_name: dauction-pg-identity
    environment: { <<: *postgres-env, POSTGRES_DB: identity }
    ports: ["5532:5432"]
    volumes:
      - pg-identity:/var/lib/postgresql/data
      # Schema applied on first boot of the volume (.down.sql files are IF EXISTS no-ops).
      - ../services/identity/migrations:/docker-entrypoint-initdb.d:ro

  pg-invite:
    <<: *postgres
    container_name: dauction-pg-invite
    environment: { <<: *postgres-env, POSTGRES_DB: invite }
    ports: ["5533:5432"]
    volumes:
      - pg-invite:/var/lib/postgresql/data
      - ../services/invite/migrations:/docker-entrypoint-initdb.d:ro

  pg-kyc:
    <<: *postgres
    container_name: dauction-pg-kyc
    environment: { <<: *postgres-env, POSTGRES_DB: kyc }
    ports: ["5534:5432"]
    volumes:
      - pg-kyc:/var/lib/postgresql/data
      - ../services/kyc/migrations:/docker-entrypoint-initdb.d:ro

  pg-vault:
    <<: *postgres
    container_name: dauction-pg-vault
    environment: { <<: *postgres-env, POSTGRES_DB: vault }
    ports: ["5535:5432"]
    volumes:
      - pg-vault:/var/lib/postgresql/data
      - ../services/vault/migrations:/docker-entrypoint-initdb.d:ro

  pg-catalog:
    <<: *postgres
    container_name: dauction-pg-catalog
    environment: { <<: *postgres-env, POSTGRES_DB: catalog }
    ports: ["5536:5432"]
    volumes:
      - pg-catalog:/var/lib/postgresql/data
      - ../services/catalog/migrations:/docker-entrypoint-initdb.d:ro

  pg-auction-dutch:
    <<: *postgres
    container_name: dauction-pg-auction-dutch
    environment: { <<: *postgres-env, POSTGRES_DB: auction_dutch }
    ports: ["5537:5432"]
    volumes:
      - pg-auction-dutch:/var/lib/postgresql/data
      - ../services/auction-dutch/migrations:/docker-entrypoint-initdb.d:ro

  pg-auction-passive:
    <<: *postgres
    container_name: dauction-pg-auction-passive
    environment: { <<: *postgres-env, POSTGRES_DB: auction_passive }
    ports: ["5538:5432"]
    volumes:
      - pg-auction-passive:/var/lib/postgresql/data
      - ../services/auction-passive/migrations:/docker-entrypoint-initdb.d:ro

  pg-bids:
    <<: *postgres
    container_name: dauction-pg-bids
    environment: { <<: *postgres-env, POSTGRES_DB: bids }
    ports: ["5539:5432"]
    volumes:
      - pg-bids:/var/lib/postgresql/data
      - ../services/bids/migrations:/docker-entrypoint-initdb.d:ro

  pg-escrow:
    <<: *postgres
    container_name: dauction-pg-escrow
    environment: { <<: *postgres-env, POSTGRES_DB: escrow }
    ports: ["5540:5432"]
    volumes:
      - pg-escrow:/var/lib/postgresql/data
      - ../services/escrow/migrations:/docker-entrypoint-initdb.d:ro

  pg-dispute:
    <<: *postgres
    container_name: dauction-pg-dispute
    environment: { <<: *postgres-env, POSTGRES_DB: dispute }
    ports: ["5541:5432"]
    volumes:
      - pg-dispute:/var/lib/postgresql/data
      - ../services/dispute/migrations:/docker-entrypoint-initdb.d:ro

  # ===== Dauction services (one container per bounded context) =====
  # Each image bakes its config.example.yaml in as /app/config.yaml (already pointing at
  # pg-<svc>, nats, jaeger); env vars below are explicit overrides for clarity.

  identity:
    build: ../services/identity
    container_name: dauction-identity
    restart: unless-stopped
    depends_on:
      pg-identity: { condition: service_healthy }
      nats: { condition: service_healthy }
    environment:
      APP_DATASOURCE_POSTGRES_DSN: postgres://dauction:dauction@pg-identity:5432/identity?sslmode=disable
      APP_DATASOURCE_NATS_DSN: nats://nats:4222
      APP_COLLECTOR_EXPORTERS_OTLP_ENDPOINT: jaeger:4317
    ports: ["18081:8080"]

  invite:
    build: ../services/invite
    container_name: dauction-invite
    restart: unless-stopped
    depends_on:
      pg-invite: { condition: service_healthy }
      nats: { condition: service_healthy }
    environment:
      APP_DATASOURCE_POSTGRES_DSN: postgres://dauction:dauction@pg-invite:5432/invite?sslmode=disable
      APP_DATASOURCE_NATS_DSN: nats://nats:4222
      APP_COLLECTOR_EXPORTERS_OTLP_ENDPOINT: jaeger:4317
    ports: ["18082:8080"]

  kyc:
    build: ../services/kyc
    container_name: dauction-kyc
    restart: unless-stopped
    depends_on:
      pg-kyc: { condition: service_healthy }
      nats: { condition: service_healthy }
    environment:
      APP_DATASOURCE_POSTGRES_DSN: postgres://dauction:dauction@pg-kyc:5432/kyc?sslmode=disable
      APP_DATASOURCE_NATS_DSN: nats://nats:4222
      APP_COLLECTOR_EXPORTERS_OTLP_ENDPOINT: jaeger:4317
    ports: ["18083:8080"]

  vault:
    build: ../services/vault
    container_name: dauction-vault
    restart: unless-stopped
    depends_on:
      pg-vault: { condition: service_healthy }
      nats: { condition: service_healthy }
    environment:
      APP_DATASOURCE_POSTGRES_DSN: postgres://dauction:dauction@pg-vault:5432/vault?sslmode=disable
      APP_DATASOURCE_NATS_DSN: nats://nats:4222
      APP_COLLECTOR_EXPORTERS_OTLP_ENDPOINT: jaeger:4317
    ports: ["18084:8080"]

  catalog:
    build: ../services/catalog
    container_name: dauction-catalog
    restart: unless-stopped
    depends_on:
      pg-catalog: { condition: service_healthy }
      nats: { condition: service_healthy }
    environment:
      APP_DATASOURCE_POSTGRES_DSN: postgres://dauction:dauction@pg-catalog:5432/catalog?sslmode=disable
      APP_DATASOURCE_NATS_DSN: nats://nats:4222
      APP_COLLECTOR_EXPORTERS_OTLP_ENDPOINT: jaeger:4317
    ports: ["18085:8080"]

  bids:
    build: ../services/bids
    container_name: dauction-bids
    restart: unless-stopped
    depends_on:
      pg-bids: { condition: service_healthy }
      nats: { condition: service_healthy }
    environment:
      APP_DATASOURCE_POSTGRES_DSN: postgres://dauction:dauction@pg-bids:5432/bids?sslmode=disable
      APP_DATASOURCE_NATS_DSN: nats://nats:4222
      APP_COLLECTOR_EXPORTERS_OTLP_ENDPOINT: jaeger:4317
    ports: ["18086:8080"]

  auction-dutch:
    build: ../services/auction-dutch
    container_name: dauction-auction-dutch
    restart: unless-stopped
    depends_on:
      pg-auction-dutch: { condition: service_healthy }
      nats: { condition: service_healthy }
    environment:
      APP_DATASOURCE_POSTGRES_DSN: postgres://dauction:dauction@pg-auction-dutch:5432/auction_dutch?sslmode=disable
      APP_DATASOURCE_NATS_DSN: nats://nats:4222
      APP_COLLECTOR_EXPORTERS_OTLP_ENDPOINT: jaeger:4317
    ports: ["18087:8080"]

  auction-passive:
    build: ../services/auction-passive
    container_name: dauction-auction-passive
    restart: unless-stopped
    depends_on:
      pg-auction-passive: { condition: service_healthy }
      nats: { condition: service_healthy }
      bids: { condition: service_started }
    environment:
      APP_DATASOURCE_POSTGRES_DSN: postgres://dauction:dauction@pg-auction-passive:5432/auction_passive?sslmode=disable
      APP_DATASOURCE_NATS_DSN: nats://nats:4222
      APP_BIDS_BASEURL: http://bids:8080
      APP_COLLECTOR_EXPORTERS_OTLP_ENDPOINT: jaeger:4317
    ports: ["18088:8080"]

  escrow:
    build: ../services/escrow
    container_name: dauction-escrow
    restart: unless-stopped
    depends_on:
      pg-escrow: { condition: service_healthy }
      nats: { condition: service_healthy }
    environment:
      APP_DATASOURCE_POSTGRES_DSN: postgres://dauction:dauction@pg-escrow:5432/escrow?sslmode=disable
      APP_DATASOURCE_NATS_DSN: nats://nats:4222
      APP_COLLECTOR_EXPORTERS_OTLP_ENDPOINT: jaeger:4317
    ports: ["18089:8080"]

  dispute:
    build: ../services/dispute
    container_name: dauction-dispute
    restart: unless-stopped
    depends_on:
      pg-dispute: { condition: service_healthy }
      nats: { condition: service_healthy }
    environment:
      APP_DATASOURCE_POSTGRES_DSN: postgres://dauction:dauction@pg-dispute:5432/dispute?sslmode=disable
      APP_DATASOURCE_NATS_DSN: nats://nats:4222
      APP_COLLECTOR_EXPORTERS_OTLP_ENDPOINT: jaeger:4317
    ports: ["18090:8080"]

  # notifier — realtime SSE fan-out; consumes domain events from NATS, owns no DB.
  notifier:
    build: ../services/notifier
    container_name: dauction-notifier
    restart: unless-stopped
    depends_on:
      nats: { condition: service_healthy }
    environment:
      APP_DATASOURCE_NATS_DSN: nats://nats:4222
      APP_COLLECTOR_EXPORTERS_OTLP_ENDPOINT: jaeger:4317
    ports: ["18091:8080"]

  # gateway — the single public entrypoint: authN + tier/KYC guard + rate-limit,
  # reverse-proxying every /apis/* route to the owning service. Stateless (no DB).
  gateway:
    build: ../services/gateway
    container_name: dauction-gateway
    restart: unless-stopped
    depends_on:
      identity: { condition: service_started }
      invite: { condition: service_started }
      kyc: { condition: service_started }
      vault: { condition: service_started }
      catalog: { condition: service_started }
      bids: { condition: service_started }
      auction-dutch: { condition: service_started }
      auction-passive: { condition: service_started }
      escrow: { condition: service_started }
      dispute: { condition: service_started }
      notifier: { condition: service_started }
    environment:
      APP_COLLECTOR_EXPORTERS_OTLP_ENDPOINT: jaeger:4317
    # The public API. All other service ports above are for direct/debug access.
    ports: ["18080:8080"]

  # web — React SPA built to static assets, served by nginx. nginx proxies
  # /apis/* to the gateway on this network (same-origin), so the browser only
  # ever hits this one origin. This is the human entrypoint: open it in a browser.
  web:
    build: ../web
    container_name: dauction-web
    restart: unless-stopped
    depends_on:
      gateway: { condition: service_started }
    environment:
      # `vite preview` proxies /apis to the gateway on this network.
      VITE_GATEWAY_PROXY: http://gateway:8080
    # Open the site here: http://127.0.0.1:18079/
    ports: ["18079:8080"]

volumes:
  nats-data:
  pg-identity:
  pg-invite:
  pg-kyc:
  pg-vault:
  pg-catalog:
  pg-auction-dutch:
  pg-auction-passive:
  pg-bids:
  pg-escrow:
  pg-dispute:
