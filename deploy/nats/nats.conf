# NATS with JetStream — shared event bus for all Dauction services.
# Services publish/consume the dauction.events.v1 contract (proto/events).
server_name: dauction-nats
jetstream {
  store_dir: "/data/jetstream"
  max_memory_store: 256MB
  max_file_store: 2GB
}
http_port: 8222   # monitoring/health
