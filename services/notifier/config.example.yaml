name: "notifier"
version: "v1.0.0"
description: "Dauction notifier service — realtime fan-out (SSE) of server-computed view-state"
environment: "development"

app:
  title: "Dauction Notifier"
  description: "Realtime fan-out edge: live Dutch price, passive countdowns, escrow state, activity toasts over SSE"
  version: "v1.0.0"
  environment: "development"

logger:
  slog:
    level: "debug"
    encoding: "json" # text or json

server:
  http:
    addr: ":8080"

# OTLP exporter (traces/metrics/logs). Points at the Jaeger all-in-one collector in
# deploy/docker-compose.yml. Override endpoint with APP_COLLECTOR_EXPORTERS_OTLP_ENDPOINT.
collector:
  exporters:
    otlp:
      endpoint: "jaeger:4317"
      insecure: true
  traces:
    enabled: true
  metrics:
    enabled: true
  logs:
    enabled: true

service:
  scheduler:
    enabled: false
    interval: "3s"

# Notifier-specific tuning. tickInterval bounds how often the live Dutch price feed
# re-broadcasts current_price + next_drop_at for each OPEN Dutch auction (target
# <100ms perceived latency for a drop). Override with APP_NOTIFIER_TICKINTERVAL.
notifier:
  tickInterval: "1s"

datasource:
  # The notifier owns NO Postgres — it holds only ephemeral in-memory subscriptions.
  # It consumes the shared NATS/JetStream event bus (durable `notifier`). Subjects are
  # every domain event it projects into broadcasts. Override with APP_DATASOURCE_NATS_DSN.
  nats:
    dsn: "nats://nats:4222"
    streamName: "DAUCTION"
    subjects: "account.>,invite.>,kyc.>,object.>,credit.>,lot.>,attestation.>,auction.>,escrow.>,bid.>,bids.>,dispute.>"
    durable: "notifier"
