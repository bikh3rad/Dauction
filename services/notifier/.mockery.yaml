quiet: False
# keeptree: True
disable-version-string: True
with-expecter: True
# mockname: "{{.InterfaceName}}"
# filename: "{{.MockName}}.go"
outpkg: mocks
packages:
  application/internal/biz:
    config:
      dir: ./internal/mocks
      all: true
      recursive: true
    interfaces:
      # UsecaseLive references biz types (*biz.Client) in its signature, so its mock
      # must live in a sub-package: keeping it in ./internal/mocks would make the
      # in-package biz tests (which import the mocks) form an import cycle
      # (biz -> mocks -> biz).
      UsecaseLive:
        config:
          dir: ./internal/mocks/usecase
