quiet: False
# keeptree: True
disable-version-string: True
with-expecter: True
# mockname: "{{.InterfaceName}}"
# filename: "{{.MockName}}.go"
outpkg: mocks
packages:
  application/internal/biz:
    config:
      dir: ./internal/mocks
      all: true
      recursive: true
    interfaces:
      # UsecaseLot references biz types (LotListFilter, AttestInput,
      # ObjectListedInput) in its signature, so its mock must live in a
      # sub-package: keeping it in ./internal/mocks would make the in-package biz
      # tests (which import the mocks) form an import cycle (biz -> mocks -> biz).
      UsecaseLot:
        config:
          dir: ./internal/mocks/usecase