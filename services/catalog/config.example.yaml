name: "catalog"
version: "v1.0.0"
description: "Dauction catalog service — lots, weekly 32-cap, certification gate, gallery"
environment: "development"

app:
  title: "Dauction Catalog"
  description: "Lots, the weekly 32-lot cap, the certification gate, and public gallery reads"
  version: "v1.0.0"
  environment: "development"

logger:
  slog:
    level: "debug"
    encoding: "json" # text or json

server:
  http:
    addr: ":8080"

# OTLP exporter (traces/metrics/logs). Points at the Jaeger all-in-one collector
# in deploy/docker-compose.yml. Override endpoint with APP_COLLECTOR_EXPORTERS_OTLP_ENDPOINT.
collector:
  exporters:
    otlp:
      endpoint: "jaeger:4317"
      insecure: true
  traces:
    enabled: true
  metrics:
    enabled: true
  logs:
    enabled: true

service:
  scheduler:
    enabled: false
    interval: "3s"

datasource:
  # Owned Postgres (db `catalog`). One DB per service — never reach into another's.
  # Override with APP_DATASOURCE_POSTGRES_DSN.
  postgres:
    dsn: "postgres://dauction:dauction@pg-catalog:5432/catalog?sslmode=disable"
  # Shared NATS/JetStream event bus. Override with APP_DATASOURCE_NATS_DSN.
  # subjects lists the subjects this service emits AND consumes (the platform
  # stream binds them; the catalog consumer filters object.listed).
  nats:
    dsn: "nats://nats:4222"
    streamName: "DAUCTION"
    subjects: "attestation.recorded,lot.certified,lot.scheduled,object.listed"
    durable: "catalog"
