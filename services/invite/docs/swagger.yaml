definitions:
  dto.ErrorResponse:
    properties:
      details:
        type: string
      message:
        type: string
    type: object
  dto.InviteChainResp:
    properties:
      accountId:
        type: string
      count:
        type: integer
      edges:
        items:
          $ref: '#/definitions/dto.InviteEdgeResp'
        type: array
    type: object
  dto.InviteEdgeResp:
    properties:
      code:
        type: string
      createdAt:
        type: string
      inviteeAccountId:
        type: string
      inviterAccountId:
        type: string
    type: object
  dto.InviteListResp:
    properties:
      count:
        type: integer
      invites:
        items:
          $ref: '#/definitions/dto.InviteResp'
        type: array
    type: object
  dto.InviteResp:
    properties:
      code:
        type: string
      createdAt:
        type: string
      id:
        type: string
      issuerAccountId:
        type: string
      redeemedAt:
        type: string
      redeemedBy:
        type: string
      status:
        type: string
    type: object
  dto.IssueInviteResp:
    properties:
      code:
        type: string
      createdAt:
        type: string
      id:
        type: string
      issuerAccountId:
        type: string
      status:
        type: string
    type: object
  dto.RedeemInviteReq:
    properties:
      code:
        maxLength: 64
        minLength: 4
        type: string
    required:
    - code
    type: object
  dto.RedeemInviteResp:
    properties:
      code:
        type: string
      issuedBy:
        type: string
      redeemedBy:
        type: string
    type: object
externalDocs:
  description: OpenAPI
  url: https://swagger.io/resources/open-api/
info:
  contact:
    email: info@aban.io
    name: API Support
    url: http://aban.io/support
  description: API documentation
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Swagger
  version: "1.0"
paths:
  /apis/admin/invites:
    get:
      description: List/filter invites for the admin console.
      parameters:
      - description: Filter by status (ISSUED|REDEEMED|REVOKED|FLAGGED)
        in: query
        name: status
        type: string
      - description: Filter by issuer account id
        in: query
        name: issuer
        type: string
      - description: Page size (default 50, max 200)
        in: query
        name: limit
        type: integer
      - description: Page offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.InviteListResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: List invites (admin)
      tags:
      - Invites Admin
  /apis/admin/invites/{code}/flag:
    post:
      description: Move an ISSUED code to FLAGGED. Non-ISSUED -> 400.
      parameters:
      - description: Invite code
        in: path
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: ""
        "400":
          description: Not in ISSUED state
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Flag an invite (admin)
      tags:
      - Invites Admin
  /apis/admin/invites/{code}/revoke:
    post:
      description: Move an ISSUED code to REVOKED. Non-ISSUED -> 400.
      parameters:
      - description: Invite code
        in: path
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: ""
        "400":
          description: Not in ISSUED state
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Revoke an invite (admin)
      tags:
      - Invites Admin
  /apis/admin/invites/chain/{accountId}:
    get:
      description: List the invitees an account brought in (invite_edge where it is
        the inviter).
      parameters:
      - description: Inviter account id
        in: path
        name: accountId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.InviteChainResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Invite chain (admin)
      tags:
      - Invites Admin
  /apis/invites:
    post:
      consumes:
      - application/json
      description: A MEMBER/VIP issues a new single-use invite code (subject to the
        per-issuer quota).
      parameters:
      - description: Authenticated account id (gateway-injected)
        in: header
        name: X-Account-Id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.IssueInviteResp'
        "400":
          description: Quota exceeded / invalid
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Issue an invite code
      tags:
      - Invites
  /apis/invites/redeem:
    post:
      consumes:
      - application/json
      description: Atomically consume a single-use invite code, elevating the caller.
        Emits invite.redeemed.
      parameters:
      - description: Authenticated account id (gateway-injected)
        in: header
        name: X-Account-Id
        required: true
        type: string
      - description: Invite code
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RedeemInviteReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RedeemInviteResp'
        "400":
          description: Bad Request / not redeemable
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Redeem an invite code
      tags:
      - Invites
  /healthz/liveness:
    get:
      consumes:
      - application/json
      description: Check the liveness of the service
      operationId: healthz-liveness
      produces:
      - application/json
      responses:
        "200":
          description: ok
      summary: Healthz Liveness
      tags:
      - healthz
  /healthz/panic:
    get:
      responses:
        "500":
          description: panic
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Panic for test
      tags:
      - healthz
  /healthz/rediness:
    get:
      consumes:
      - application/json
      description: Check the readiness of the service
      operationId: healthz-rediness
      produces:
      - application/json
      responses:
        "200":
          description: ok
      summary: Healthz Readiness
      tags:
      - healthz
  /healthz/sleep/{time}:
    get:
      parameters:
      - description: Time to sleep, e.g. 30s
        in: path
        name: time
        required: true
        type: string
      responses:
        "200":
          description: ok
      summary: Long Run for test
      tags:
      - healthz
securityDefinitions:
  BasicAuth:
    type: basic
swagger: "2.0"
