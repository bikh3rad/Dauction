name: "invite"
version: "v1.0.0"
description: "Dauction invite service: single-use codes, redemption, invite chain"
environment: "development"

app:
  title: "Dauction Invite Service"
  description: "Single-use invite codes, redemption and the invite chain"
  version: "v1.0.0"
  environment: "development"

logger:
  slog:
    level: "debug"
    encoding: "json" # text or json

server:
  http:
    addr: ":8080"

# Invite-service policy (house rules).
invite:
  # Max single-use codes a MEMBER/VIP account may issue. <=0 = unlimited.
  issueQuota: 5

# OTLP collector (Jaeger all-in-one in deploy/docker-compose.yml).
collector:
  exporters:
    otlp:
      endpoint: "jaeger:4317"
      insecure: true
  traces:
    enabled: true
  metrics:
    enabled: true
  logs:
    enabled: true

service:
  scheduler:
    enabled: false
    interval: "3s"

datasource:
  postgres:
    dsn: "postgresql://dauction:dauction@pg-invite:5432/invite?sslmode=disable"
  nats:
    dsn: "nats://nats:4222"
    initJetstream: true
    streamName: "DAUCTION"
    subject: "account.>,invite.>,kyc.>,object.>,credit.>,lot.>,attestation.>,auction.>,escrow.>,bid.>,bids.>,dispute.>"
  redis:
    Enabled: false
    Address: localhost:6379
    Password: ""
    DB: ""
