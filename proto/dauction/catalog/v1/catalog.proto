syntax = "proto3";

// catalog — lots, weekly 32-cap, certification gate, gallery reads.
package dauction.catalog.v1;

import "dauction/common/v1/common.proto";

option go_package = "github.com/bikh3rad/Dauction/proto/gen/dauction/catalog/v1;catalogv1";

// A gallery lot. title/description/provenance are multilingual, returned WHOLE.
message Lot {
  string id = 1;
  uint32 no = 2;
  string ref = 3;                          // house reference, e.g. "DXB·26·W23·007"
  string maison = 4;
  dauction.common.v1.I18nText title = 5;
  dauction.common.v1.I18nText description = 6;
  dauction.common.v1.I18nText provenance = 7;
  string category = 8;                     // machine key
  uint32 year = 9;
  string condition = 10;                   // machine/owner string
  dauction.common.v1.AuctionMode mode = 11;
  dauction.common.v1.AuctionState state = 12;
  dauction.common.v1.Money floor = 13;
  dauction.common.v1.Money start = 14;     // Dutch ceiling / start price
  dauction.common.v1.Money drop_step = 15; // Dutch
  uint32 drop_interval_secs = 16;          // Dutch
  string opens_at = 17;                    // ISO-8601 UTC
  string closes_at = 18;                   // ISO-8601 UTC; empty for DUTCH
  uint32 watching = 19;
  uint32 participants = 20;
  string inspector = 21;                   // sealing inspector account id (empty until inspected)
  bool certified = 22;                     // true only after an APPROVED inspection
  bool box = 23;
  int32 premium_bps = 24;                  // buyer's premium in basis points (e.g. 1000 = 10%)
  repeated string image_refs = 25;         // ordered carousel images (≤7), [0] is the cover
  string authenticity = 26;                // GENUINE|... from the inspection seal (empty if pending)
  string condition_grade = 27;             // MINT|EXCELLENT|... from the inspection seal
}

// GET /apis/gallery/weekly
message GetWeeklyRequest {
  string filter = 1; // optional: LIVE | UPCOMING | ALL
}
message GetWeeklyResponse {
  repeated Lot lots = 1;
  uint32 week = 2;
  uint32 supply_cap = 3; // 32
}

// GET /apis/lots/{id}
message GetLotRequest { string id = 1; }
message GetLotResponse { Lot lot = 1; }

// POST /apis/admin/lots/{id}/certify — house/inspector certification gate.
message CertifyLotRequest {
  string lot_id = 1;
  string attestation_id = 2; // PASS attestation reference
}
message CertifyLotResponse { Lot lot = 1; }

// =====================================================================
// Categories — robust categorization for items. Codes are language-neutral; the
// client localizes display names. icon_key maps to the design-team icon set.
// =====================================================================
message Category {
  string code = 1;       // WATCHES|JEWELRY|FINE_ART|AUTOMOBILES|HANDBAGS|RARE_SPIRITS|COLLECTIBLES
  string icon_key = 2;   // sprite key for the per-category icon
  uint32 sort_order = 3;
  bool active = 4;
}
// GET /apis/categories
message ListCategoriesRequest {}
message ListCategoriesResponse { repeated Category categories = 1; }

// =====================================================================
// Inspector workflow — the auction-eligibility gate. A lot cannot be certified
// or scheduled (and therefore cannot appear in the gallery or open) until an
// account with the INSPECTOR role seals an APPROVED verdict.
// =====================================================================

// GET /apis/inspector/queue — lots awaiting inspection (INSPECTOR role required)
message InspectionQueueRequest { uint32 limit = 1; uint32 offset = 2; }
message InspectionQueueResponse { repeated Lot lots = 1; uint32 total = 2; }

// POST /apis/inspector/lots/{id}/inspect — record the sealing verdict.
message InspectLotRequest {
  string lot_id = 1;
  string verdict = 2;          // validate: required, APPROVED|REJECTED
  string authenticity = 3;     // validate: required, GENUINE|COUNTERFEIT|INCONCLUSIVE
  string condition_grade = 4;  // MINT|EXCELLENT|GOOD|FAIR|POOR (required when APPROVED)
  string notes = 5;            // machine/free notes (not shown as localized prose)
}
message InspectLotResponse {
  Lot lot = 1;                 // certified=true & state advanced on APPROVED
}
